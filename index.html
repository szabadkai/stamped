<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stamped — 3D Stamp Generator</title>
    <link rel="stylesheet" href="/style.css" />
    <script>
      // Apply theme before first paint to prevent flash
      (function() {
        const saved = localStorage.getItem('stamped-theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
        }
      })();
    </script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div>
            <h1>Stamped</h1>
            <p class="subtitle">3D Stamp Generator</p>
          </div>
          <button id="theme-toggle" class="icon-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </header>

        <div class="upload-zone" id="upload-zone">
          <input type="file" accept=".svg" id="svg-input" />
          <label for="svg-input">
            <svg class="upload-icon-svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span class="upload-text">Upload SVG</span>
            <span class="upload-hint">or drag &amp; drop here</span>
          </label>
        </div>

        <div class="controls" id="controls">
          <div class="control-section">
            <div class="section-label">Extrusion</div>

            <div class="control-group">
              <div class="control-header">
                <label for="depth">Depth</label>
                <span id="depth-value" class="value-label">2.5 mm</span>
              </div>
              <input type="range" id="depth" min="1" max="5" step="0.1" value="2.5" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="bevel">Chamfer</label>
                <span id="bevel-value" class="value-label">0.5 mm</span>
              </div>
              <input type="range" id="bevel" min="0" max="2" step="0.1" value="0.5" />
            </div>
          </div>

          <div class="control-section">
            <div class="section-label">Placement</div>

            <div class="control-group">
              <div class="control-header">
                <label for="scale">Scale</label>
                <span id="scale-value" class="value-label">90%</span>
              </div>
              <input type="range" id="scale" min="10" max="200" step="1" value="90" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="rotation">Rotation</label>
                <span id="rotation-value" class="value-label">0°</span>
              </div>
              <input type="range" id="rotation" min="0" max="360" step="1" value="0" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="art-rotation">Art rotation</label>
                <span id="art-rotation-value" class="value-label">0°</span>
              </div>
              <input type="range" id="art-rotation" min="-180" max="180" step="1" value="0" />
            </div>

            <button id="reset-pos-btn" class="btn-secondary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              Reset Position
            </button>
          </div>

          <div class="control-section">
            <div class="section-label">Border</div>

            <div class="control-group checkbox-group">
              <label>
                <input type="checkbox" id="circle-enabled" />
                <span class="checkbox-label">Circle around design</span>
              </label>
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="circle-thickness">Circle thickness</label>
                <span id="circle-thickness-value" class="value-label">1.5 mm</span>
              </div>
              <input type="range" id="circle-thickness" min="0.4" max="4" step="0.1" value="1.5" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="gap">Gap to design</label>
                <span id="gap-value" class="value-label">2 mm</span>
              </div>
              <input type="range" id="gap" min="0" max="12" step="0.1" value="2" />
            </div>
          </div>

          <div class="control-section">
            <div class="section-label">Legend</div>

            <div class="control-group">
              <label for="legend-top" class="field-label">Top text</label>
              <input type="text" id="legend-top" class="text-input" placeholder="e.g. OFFICIAL SEAL" maxlength="60" />
            </div>

            <div class="control-group">
              <label for="legend-bottom" class="field-label">Bottom text</label>
              <input type="text" id="legend-bottom" class="text-input" placeholder="e.g. EST. 2026" maxlength="60" />
            </div>

            <div class="control-group">
              <label for="legend-font" class="field-label">Font</label>
              <select id="legend-font" class="select-input"></select>
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="legend-size">Text size</label>
                <span id="legend-size-value" class="value-label">4 mm</span>
              </div>
              <input type="range" id="legend-size" min="1.5" max="8" step="0.1" value="4" />
            </div>

            <div class="control-group">
              <div class="control-header">
                <label for="legend-angle">Legend angle</label>
                <span id="legend-angle-value" class="value-label">0°</span>
              </div>
              <input type="range" id="legend-angle" min="-180" max="180" step="1" value="0" />
            </div>
          </div>

          <div class="control-section">
            <div class="control-group checkbox-group">
              <label>
                <input type="checkbox" id="mirror" checked />
                <span class="checkbox-label">Mirror for stamping</span>
              </label>
            </div>
            <div class="control-group checkbox-group">
              <label>
                <input type="checkbox" id="flip-winding" />
                <span class="checkbox-label">Flip hole winding</span>
              </label>
            </div>
          </div>
        </div>

        <div class="sidebar-footer">
          <button id="download-btn" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download STL
          </button>
          <div id="status" class="status">Loading stamp base...</div>
        </div>
      </aside>

      <main class="viewport">
        <canvas id="preview"></canvas>
        <div class="viewport-hint" id="viewport-hint">Click and drag the blue pattern to reposition it</div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
